<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>COMMOD/TERM — Institutional Commodity Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#000000;
  --s1:#0a0a0a;
  --s2:#121212;
  --s3:#1a1a1a;
  --border:#333333;
  --border2:#222222;
  --orange:#FF9900;
  --orange2:#CC7700;
  --orange-dim:rgba(255,153,0,.12);
  --white:#F0F0F0;
  --gray:#888888;
  --gray2:#555555;
  --gray3:#333333;
  --green:#00CC44;
  --green-bright:#00FF41;
  --red:#FF3333;
  --red-dim:rgba(255,51,51,.15);
  --green-dim:rgba(0,204,68,.15);
  --gold:#D4AF37;
  --gold-dim:rgba(212,175,55,.15);
  --amber:#FF7E00;
  --amber-dim:rgba(255,126,0,.15);
  --harvest:#4F7942;
  --harvest-dim:rgba(79,121,66,.15);
  --mono:'JetBrains Mono',monospace;
  --sans:'Barlow Condensed',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:12px;-webkit-font-smoothing:antialiased;}
body{background:var(--black);color:var(--white);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
button{font-family:var(--sans);cursor:pointer;border:none;outline:none;background:none;}
input{font-family:var(--mono);outline:none;background:none;}
select{font-family:var(--sans);outline:none;background:var(--s2);color:var(--white);border:1px solid var(--border);cursor:pointer;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:#000;}
::-webkit-scrollbar-thumb{background:#333;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}

@keyframes blink{0%,100%{opacity:1}49%{opacity:1}50%{opacity:0}99%{opacity:0}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes priceUp{0%{color:var(--green-bright)}100%{color:inherit}}
@keyframes priceDn{0%{color:var(--red)}100%{color:inherit}}

.fade-in{animation:fadeIn .2s ease-out forwards;}
.blink{animation:blink 1s step-end infinite;}
.cursor::after{content:'█';animation:blink .8s step-end infinite;color:var(--orange);font-size:.9em;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── TICKER RIBBON ── */
.ribbon{background:#000;border-bottom:1px solid var(--border);height:24px;overflow:hidden;flex-shrink:0;}
.ribbon-inner{display:inline-flex;gap:0;white-space:nowrap;animation:ticker 90s linear infinite;height:100%;align-items:center;}
.rib-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;border-right:1px solid var(--border2);height:100%;font-size:11px;}
.rib-sym{color:var(--gray);font-weight:500;letter-spacing:.5px;font-family:var(--sans);}
.rib-price{font-family:var(--mono);font-size:11px;}
.rib-chg{font-family:var(--mono);font-size:10px;}
.up{color:var(--green);}
.dn{color:var(--red);}
.unch{color:var(--gray);}

/* ── COMMAND HEADER ── */
.cmd-header{background:var(--black);border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;height:36px;}
.cmd-logo{display:flex;align-items:center;gap:8px;padding:0 16px;border-right:1px solid var(--border);flex-shrink:0;}
.cmd-logo-text{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:2px;color:var(--orange);}
.cmd-logo-sub{font-size:10px;color:var(--gray2);letter-spacing:1px;margin-top:1px;}
.cmd-tabs{display:flex;align-items:stretch;flex:1;}
.cmd-tab{display:flex;align-items:center;gap:6px;padding:0 18px;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--gray);border-right:1px solid var(--border2);cursor:pointer;transition:all .15s;position:relative;font-family:var(--sans);}
.cmd-tab:hover{background:var(--s1);color:var(--white);}
.cmd-tab.active{color:var(--orange);background:var(--s1);}
.cmd-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--orange);}
.cmd-tab .kbshort{font-size:9px;color:var(--gray2);background:var(--s3);padding:1px 4px;border:1px solid var(--border);}
.cmd-tab.active .kbshort{color:var(--orange2);}
.cmd-right{display:flex;align-items:center;gap:0;margin-left:auto;}
.wallet-btn{display:flex;align-items:center;gap:6px;padding:0 14px;font-size:11px;font-weight:500;color:var(--gray);border-left:1px solid var(--border);cursor:pointer;height:100%;transition:all .15s;letter-spacing:.5px;font-family:var(--sans);}
.wallet-btn:hover{background:var(--s1);color:var(--white);}
.wallet-btn.conn{color:var(--green);}
.wallet-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* ── BREADCRUMB ── */
.breadcrumb{background:var(--s1);border-bottom:1px solid var(--border2);padding:4px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.bc-path{font-size:10px;color:var(--gray2);letter-spacing:.8px;font-family:var(--sans);}
.bc-path span{color:var(--orange);}
.bc-right{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--gray2);}
.bc-toggle{display:flex;gap:1px;}
.bc-tog-btn{padding:2px 8px;font-size:10px;letter-spacing:.5px;font-family:var(--sans);font-weight:500;color:var(--gray);border:1px solid var(--border2);background:none;transition:all .12s;cursor:pointer;}
.bc-tog-btn.active{background:var(--orange);color:#000;border-color:var(--orange);}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden;gap:0;}

/* ── LEFT SIDEBAR — Market Monitor ── */
.sidebar{width:196px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sb-title{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--orange);font-family:var(--sans);}
.sb-count{font-size:10px;color:var(--gray2);font-family:var(--mono);}
.sb-list{overflow-y:auto;flex:1;}
.sb-cat{padding:4px 10px 2px;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--gray2);font-family:var(--sans);display:flex;align-items:center;gap:6px;}
.sb-cat::before{content:'';width:8px;height:2px;flex-shrink:0;}
.sb-cat.cat-metals::before{background:var(--gold);}
.sb-cat.cat-energy::before{background:var(--amber);}
.sb-cat.cat-agri::before{background:var(--harvest);}
.sb-row{padding:5px 10px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s;display:grid;grid-template-columns:1fr auto;gap:2px 6px;align-items:center;position:relative;}
.sb-row:hover{background:var(--s1);}
.sb-row.active{background:var(--s2);}
.sb-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--orange);}
.sb-row-cat{border-top:2px solid transparent;}
.sb-row-cat.cat-metals{border-top-color:var(--gold);}
.sb-row-cat.cat-energy{border-top-color:var(--amber);}
.sb-row-cat.cat-agri{border-top-color:var(--harvest);}
.sb-sym{font-size:11px;font-weight:600;color:var(--white);font-family:var(--sans);letter-spacing:.3px;}
.sb-price{font-size:11px;font-family:var(--mono);text-align:right;}
.sb-name{font-size:9px;color:var(--gray2);font-family:var(--sans);}
.sb-timer{font-size:9px;font-family:var(--mono);}
.sb-phase{font-size:8px;padding:1px 4px;border:1px solid;font-family:var(--sans);font-weight:600;letter-spacing:.5px;}
.ph-open{color:var(--green);border-color:var(--green);}
.ph-lock{color:var(--amber);border-color:var(--amber);}
.ph-res{color:var(--red);border-color:var(--red);}

/* ── CENTER — Grid + Deep Dive ── */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* Grid view */
.grid-view{flex:1;overflow-y:auto;padding:8px;}
.grid-section{margin-bottom:12px;}
.grid-section-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 2px;}
.grid-section-label{font-size:10px;font-weight:700;letter-spacing:2px;font-family:var(--sans);}
.grid-section-line{flex:1;height:1px;background:var(--border2);}
.grid-row{display:grid;gap:6px;}
.grid-row.cols-3{grid-template-columns:repeat(3,1fr);}
.grid-row.cols-4{grid-template-columns:repeat(4,1fr);}

/* Market card */
.mkt-card{background:var(--s1);border:1px solid var(--border2);display:flex;flex-direction:column;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden;}
.mkt-card:hover{border-color:var(--border);}
.mkt-card.active{border-color:var(--orange);}
.mkt-card.active::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--orange);}
.mkt-card-top{border-top:2px solid transparent;}
.mkt-card-top.cat-metals{border-top-color:var(--gold);}
.mkt-card-top.cat-energy{border-top-color:var(--amber);}
.mkt-card-top.cat-agri{border-top-color:var(--harvest);}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;padding:7px 9px 4px;}
.card-sym{font-size:13px;font-weight:700;color:var(--white);letter-spacing:.5px;font-family:var(--sans);}
.card-name{font-size:9px;color:var(--gray2);font-family:var(--sans);margin-top:1px;}
.card-price-block{text-align:right;}
.card-price{font-size:14px;font-family:var(--mono);font-weight:500;line-height:1;}
.card-chg{font-size:10px;font-family:var(--mono);margin-top:1px;}
.card-chart{padding:0 6px;height:44px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-top:1px solid var(--border2);}
.card-timer{font-size:11px;font-family:var(--mono);}
.card-sentiment{display:flex;flex-direction:column;gap:2px;flex:1;margin:0 8px;}
.sentiment-bar{height:4px;background:var(--red-dim);border:1px solid var(--border2);position:relative;overflow:hidden;}
.sentiment-long{height:100%;background:var(--green);transition:width .5s ease;}
.sentiment-labels{display:flex;justify-content:space-between;font-size:8px;font-family:var(--mono);}
.card-actions{display:flex;gap:3px;}
.card-btn{padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:.5px;font-family:var(--sans);border:1px solid;transition:all .12s;}
.btn-buy{color:var(--green);border-color:var(--green);background:var(--green-dim);}
.btn-buy:hover{background:var(--green);color:#000;}
.btn-sell{color:var(--red);border-color:var(--red);background:var(--red-dim);}
.btn-sell:hover{background:var(--red);color:#000;}
.btn-buy:disabled,.btn-sell:disabled{opacity:.3;cursor:not-allowed;}

/* ── DEEP DIVE VIEW ── */
.deep-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.deep-header{padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.deep-back{font-size:10px;color:var(--gray2);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--sans);font-weight:600;letter-spacing:.5px;transition:color .12s;}
.deep-back:hover{color:var(--orange);}
.deep-asset{font-size:15px;font-weight:700;color:var(--white);font-family:var(--sans);letter-spacing:.5px;}
.deep-price{font-size:22px;font-family:var(--mono);font-weight:500;}
.deep-chg{font-size:12px;font-family:var(--mono);}
.deep-phase{font-size:10px;padding:2px 8px;border:1px solid;font-family:var(--sans);font-weight:600;letter-spacing:.5px;}
.deep-body{flex:1;display:flex;overflow:hidden;min-height:0;}
.deep-center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;padding:8px;}
.deep-right{width:260px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}

/* Filmstrip */
.filmstrip{display:flex;gap:3px;padding:0 0 6px;flex-shrink:0;}
.film-box{flex:1;min-width:28px;height:24px;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--mono);font-weight:600;border:1px solid;}
.film-long{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.film-short{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.film-none{background:var(--s2);border-color:var(--border2);color:var(--gray2);}
.film-label{font-size:8px;color:var(--gray2);font-family:var(--sans);letter-spacing:.5px;margin-bottom:3px;}

/* Chart */
.chart-wrap{flex:1;position:relative;min-height:0;}
.chart-label{font-size:9px;color:var(--gray2);font-family:var(--sans);letter-spacing:.5px;margin-bottom:4px;}

/* Order entry */
.order-section{padding:10px 12px;border-bottom:1px solid var(--border2);}
.order-title{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--orange);font-family:var(--sans);margin-bottom:8px;}
.order-label{font-size:9px;color:var(--gray);font-family:var(--sans);letter-spacing:.5px;margin-bottom:4px;}
.order-input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--white);font-size:16px;padding:7px 10px;font-family:var(--mono);transition:border-color .15s;}
.order-input:focus{border-color:var(--orange);}
.order-input.cursor-active::after{content:'█';}
.quick-row{display:flex;gap:3px;margin:6px 0;}
.quick-btn{flex:1;padding:4px 0;font-size:10px;font-weight:600;font-family:var(--sans);color:var(--gray);background:var(--s2);border:1px solid var(--border2);transition:all .12s;cursor:pointer;}
.quick-btn:hover{border-color:var(--orange);color:var(--orange);}
.quick-btn.aq{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);}
.exec-row{display:flex;gap:4px;margin-top:8px;}
.exec-long{flex:1;padding:10px;font-size:13px;font-weight:700;letter-spacing:1px;font-family:var(--sans);background:var(--green-dim);color:var(--green-bright);border:1px solid var(--green);transition:all .15s;}
.exec-long:hover:not(:disabled){background:var(--green);color:#000;}
.exec-long:disabled{opacity:.3;cursor:not-allowed;}
.exec-short{flex:1;padding:10px;font-size:13px;font-weight:700;letter-spacing:1px;font-family:var(--sans);background:var(--red-dim);color:var(--red);border:1px solid var(--red);transition:all .15s;}
.exec-short:hover:not(:disabled){background:var(--red);color:#000;}
.exec-short:disabled{opacity:.3;cursor:not-allowed;}
.payout-box{margin-top:8px;padding:6px 8px;background:var(--s2);border:1px solid var(--border2);}
.payout-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px;}
.payout-lbl{color:var(--gray);font-family:var(--sans);}
.payout-val{font-family:var(--mono);color:var(--white);}
.payout-val.positive{color:var(--green);}
.payout-val.orange{color:var(--orange);}
.exec-msg{margin-top:6px;padding:5px 8px;font-size:10px;font-family:var(--sans);border:1px solid;}

/* Stats in deep view */
.stats-section{padding:10px 12px;border-bottom:1px solid var(--border2);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.stat-cell{background:var(--s2);padding:5px 7px;}
.stat-lbl{font-size:8px;color:var(--gray2);font-family:var(--sans);letter-spacing:.8px;margin-bottom:2px;}
.stat-val{font-size:12px;font-family:var(--mono);}

/* Round meter */
.round-meter{padding:8px 12px;border-bottom:1px solid var(--border2);}
.meter-label{display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px;font-family:var(--sans);}
.meter-bar{height:3px;background:var(--border2);}
.meter-fill{height:100%;transition:width .9s linear;}
.tug-section{margin-top:8px;}
.tug-labels{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);margin-bottom:3px;}
.tug-bar{height:8px;background:var(--red-dim);border:1px solid var(--border2);position:relative;}
.tug-long{height:100%;background:var(--green);transition:width .5s ease;}

/* ── BOTTOM TABS ── */
.bottom{height:180px;flex-shrink:0;border-top:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.bottom-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.bot-tab{padding:5px 14px;font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--gray);font-family:var(--sans);cursor:pointer;border-right:1px solid var(--border2);transition:all .12s;position:relative;}
.bot-tab:hover{color:var(--white);}
.bot-tab.active{color:var(--orange);}
.bot-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--orange);}
.bot-tab .count{font-size:9px;background:var(--orange);color:#000;padding:0 4px;margin-left:4px;font-family:var(--mono);}
.bottom-content{flex:1;overflow-y:auto;}

/* Position rows */
.pos-table{width:100%;border-collapse:collapse;}
.pos-table th{font-size:9px;font-weight:600;letter-spacing:.8px;color:var(--gray2);font-family:var(--sans);padding:4px 10px;border-bottom:1px solid var(--border2);text-align:left;background:var(--s1);white-space:nowrap;}
.pos-table td{font-size:10px;padding:5px 10px;border-bottom:1px solid var(--border2);font-family:var(--mono);white-space:nowrap;vertical-align:middle;}
.pos-table tr:hover td{background:var(--s1);}
.pos-side-long{color:var(--green);font-weight:600;}
.pos-side-short{color:var(--red);font-weight:600;}
.pos-status{font-size:9px;padding:1px 5px;border:1px solid;font-family:var(--sans);font-weight:600;}
.pos-open{color:var(--orange);border-color:var(--orange);}
.pos-win{color:var(--green);border-color:var(--green);}
.pos-loss{color:var(--red);border-color:var(--red);}
.claim-btn{padding:2px 8px;font-size:9px;font-weight:600;font-family:var(--sans);background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold);cursor:pointer;transition:all .12s;letter-spacing:.5px;}
.claim-btn:hover{background:var(--gold);color:#000;}
.empty-state{padding:20px;text-align:center;font-size:11px;color:var(--gray2);font-family:var(--sans);letter-spacing:.5px;}

/* ── RIGHT PANEL — Wallet / global ── */
.right-rail{width:0;flex-shrink:0;border-left:1px solid var(--border);overflow:hidden;transition:width .2s ease;display:flex;flex-direction:column;}
.right-rail.open{width:220px;}

/* ── STATUS BAR ── */
.statusbar{background:var(--black);border-top:1px solid var(--border2);padding:2px 12px;display:flex;justify-content:space-between;font-size:9px;color:var(--gray2);font-family:var(--sans);letter-spacing:.5px;flex-shrink:0;}
.sb-ok{color:var(--green);}
.sb-warn{color:var(--amber);}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:9000;}
.modal-box{background:var(--s2);border:1px solid var(--border);padding:24px;min-width:300px;max-width:380px;animation:fadeIn .15s ease-out;}
.modal-title{font-size:13px;font-weight:700;color:var(--orange);font-family:var(--sans);letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border2);}
.modal-body{font-size:11px;color:var(--gray);font-family:var(--sans);line-height:1.7;margin-bottom:16px;}
.modal-body strong{color:var(--white);}
.modal-close{padding:6px 16px;font-size:11px;font-weight:600;letter-spacing:.5px;font-family:var(--sans);background:none;color:var(--orange);border:1px solid var(--orange);cursor:pointer;float:right;transition:all .12s;}
.modal-close:hover{background:var(--orange);color:#000;}

canvas{display:block;}
</style>
</head>
<body>
<div id="app"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─── ASSET DEFINITIONS ──────────────────────────────────────────────────── */
const ASSETS=[
  // METALS
  {id:"XAU",sym:"XAU/USD",name:"Gold Spot",      base:2345.20,vol:0.55, cat:"METALS", unit:"t oz"},
  {id:"XAG",sym:"XAG/USD",name:"Silver Spot",     base:28.430, vol:0.09, cat:"METALS", unit:"t oz"},
  {id:"XCU",sym:"XCU/USD",name:"Copper",          base:4.1240, vol:0.004,cat:"METALS", unit:"lb"},

/* ─── UTILS ──────────────────────────────────────────────────────────────── */
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function nxt(p,vol){return Math.max(p*.85,Math.min(p*1.15,p+gauss()*vol));}
function fp(p,n){if(n!=null)return p.toFixed(n);return p>=1000?p.toFixed(2):p>=10?p.toFixed(3):p.toFixed(4);}
function ft(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
function fa(a){return a?`${a.slice(0,6)}…${a.slice(-4)}`:"N/A";}
function ts(){return new Date().toLocaleTimeString("en-US",{hour12:false});}
function phaseCls(p){return p==="OPEN"?"ph-open":p==="LOCKED"?"ph-lock":"ph-res";}
function phaseIco(p){return p==="OPEN"?"●":p==="LOCKED"?"⬡":"■";}

/* ─── SPARKLINE — crisp 1px vector line, no glow ────────────────────────── */
function Spark({data,height=44,color=null,mini=false}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||data.length<2)return;
    const cv=ref.current,ctx=cv.getContext("2d");
    const W=cv.offsetWidth||300;
    cv.width=W;cv.height=height;
    ctx.clearRect(0,0,W,height);
    const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
    const xs=i=>(i/(data.length-1))*(W-2)+1;
    const ys=v=>height-2-((v-mn)/rng)*(height-4);
    const up=data[data.length-1]>=data[0];
    const c=color||(up?"#00CC44":"#FF3333");
    ctx.beginPath();
    ctx.lineWidth=1;
    ctx.strokeStyle=c;
    data.forEach((v,i)=>i===0?ctx.moveTo(xs(i),ys(v)):ctx.lineTo(xs(i),ys(v)));
    ctx.stroke();
    if(!mini){
      // zero line
      const zeroY=ys(data[0]);
      ctx.beginPath();ctx.lineWidth=1;ctx.strokeStyle="rgba(255,255,255,.06)";
      ctx.setLineDash([2,4]);ctx.moveTo(1,zeroY);ctx.lineTo(W-1,zeroY);ctx.stroke();ctx.setLineDash([]);
    }
  },[data,height,color,mini]);
  return <canvas ref={ref} style={{width:"100%",height,display:"block"}}/>;
}

/* ─── CANDLESTICK CHART ──────────────────────────────────────────────────── */
function CandleChart({data,height=160}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||data.length<2)return;
    const cv=ref.current,ctx=cv.getContext("2d");
    const W=cv.offsetWidth||600;
    cv.width=W;cv.height=height;
    ctx.clearRect(0,0,W,height);

    // Build candles from tick data (group every 6 ticks = ~12s candle)
    const size=Math.max(1,Math.floor(data.length/Math.min(data.length,40)));
    const candles=[];
    for(let i=0;i<data.length;i+=size){
      const slice=data.slice(i,i+size);
      candles.push({o:slice[0],c:slice[slice.length-1],h:Math.max(...slice),l:Math.min(...slice)});
    }
    if(candles.length<2)return;

    const allH=candles.map(c=>c.h),allL=candles.map(c=>c.l);
    const mn=Math.min(...allL)*.9995,mx=Math.max(...allH)*1.0005,rng=mx-mn||1;
    const ys=v=>height-4-((v-mn)/rng)*(height-8);
    const cW=Math.max(3,Math.floor((W-20)/candles.length)-1);
    const gap=Math.max(1,Math.floor((W-20)/candles.length));

    // Grid
    ctx.strokeStyle="rgba(255,255,255,.04)";ctx.lineWidth=1;
    for(let i=0;i<5;i++){const y=(i/4)*(height-8)+4;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    candles.forEach((c,i)=>{
      const x=10+i*gap;
      const bull=c.c>=c.o;
      const col=bull?"#00CC44":"#FF3333";
      // Wick
      ctx.strokeStyle=col;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+cW/2,ys(c.h));ctx.lineTo(x+cW/2,ys(c.l));ctx.stroke();
      // Body
      const yO=ys(c.o),yC=ys(c.c);
      const bodyY=Math.min(yO,yC),bodyH=Math.max(1,Math.abs(yO-yC));
      ctx.fillStyle=col;
      ctx.fillRect(x,bodyY,cW,bodyH);
    });
  },[data,height]);
  return <canvas ref={ref} style={{width:"100%",height,display:"block"}}/>;
}

  return ASSETS.map(a=>({

    lp:a.base, sp:a.base, hist:[a.base],
    phase:"OPEN",
    tl:Math.floor(Math.random()*ROUND),
    rid:Math.floor(Math.random()*200)+1,
    pl:+(Math.random()*800).toFixed(2),
    ps:+(Math.random()*700).toFixed(2),
    last:null,
    film:Array.from({length:10},()=>Math.random()>.45?"LONG":"SHORT"),
  }));
}

                    {dm.film.map((f,i)=>(
                      <div key={i} className={`film-box ${f==="LONG"?"film-long":f==="SHORT"?"film-short":"film-none"}`}>
                        {f==="LONG"?"L":f==="SHORT"?"S":"—"}
                      </div>
                    ))}
                  </div>
                  <div className="chart-label">1-MINUTE CANDLESTICK CHART — {dm.sym}</div>
                  <div className="chart-wrap">
                    <CandleChart data={dm.hist} height={Math.max(120,180)}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--gray2)",fontFamily:"var(--sans)",marginTop:3,letterSpacing:".5px"}}>
                    <span>LO {fp(Math.min(...dm.hist))}</span>
                    <span>OPEN {fp(dm.sp)}</span>
                    <span>HI {fp(Math.max(...dm.hist))}</span>
                    <span>NOW {fp(dm.lp)}</span>
                  </div>
                </div>

                {/* ORDER ENTRY */}
                <div className="deep-right">
                  <div className="order-section">
                    <div className="order-title">ORDER ENTRY</div>
                    <div className="order-label">STAKE (ETH)</div>
                    <input type="number" className="order-input" value={stake}
                      onChange={e=>setStake(e.target.value)} placeholder="0.0100"/>
                    <div className="quick-row">
                      {["0.005","0.01","0.05","0.1"].map(v=>(
                        <button key={v} className={`quick-btn${stake===v?" aq":""}`} onClick={()=>setStake(v)}>{v}</button>
                      ))}
                    </div>
                    <div className="exec-row">
                      <button className="exec-long" onClick={()=>placeBet("LONG",dm.id)} disabled={dm.phase!=="OPEN"||txp}>
                        {txp?"PENDING":"▲ LONG"}
                      </button>
                      <button className="exec-short" onClick={()=>placeBet("SHORT",dm.id)} disabled={dm.phase!=="OPEN"||txp}>
                        {txp?"PENDING":"▼ SHORT"}
                      </button>
                    </div>
                    {dm.phase!=="OPEN"&&!execMsg&&(
                      <div style={{marginTop:6,padding:"5px 8px",background:"rgba(255,126,0,.08)",border:"1px solid rgba(255,126,0,.4)",color:"#FF7E00",fontSize:10,fontFamily:"var(--sans)",textAlign:"center",letterSpacing:".5px"}}>
                        {dm.phase==="LOCKED"?"⬡ LOCKED — NEXT ROUND OPENING SOON":"■ SETTLING ROUND…"}
                      </div>
                    )}
                    {execMsg&&(
                      <div className="exec-msg" style={{color:execMsg.c,borderColor:execMsg.c}}>{execMsg.t}</div>
                    )}
                    {/* Payout estimate */}
                    {parseFloat(stake)>0&&(()=>{
                      const a=parseFloat(stake)||0;
                      const tot=dm.pl+dm.ps;
                      const longOdds=dm.pl>0?(tot+a)/(dm.pl+a):1;
                      const shortOdds=dm.ps>0?(tot+a)/(dm.ps+a):1;
                      const longRoi=((longOdds-1)*100).toFixed(1);
                      const shortRoi=((shortOdds-1)*100).toFixed(1);
                      return(
                        <div className="payout-box" style={{marginTop:8}}>
                          <div className="payout-row">
                            <span className="payout-lbl">EST. LONG RETURN</span>
                            <span className="payout-val positive">+{longRoi}%</span>
                          </div>
                          <div className="payout-row">
                            <span className="payout-lbl">EST. SHORT RETURN</span>
                            <span className="payout-val positive">+{shortRoi}%</span>
                          </div>
                          <div className="payout-row">
                            <span className="payout-lbl">ROUND</span>
                            <span className="payout-val orange">#{dm.rid}</span>
                          </div>
                          <div className="payout-row">
                            <span className="payout-lbl">CLOSES IN</span>
                            <span className="payout-val orange">{ft(dm.tl)}</span>
                          </div>
                        </div>
                      );
                    })()}
                    {!wallet&&(
                      <div style={{marginTop:8,padding:"5px 8px",background:"rgba(255,153,0,.06)",border:"1px solid rgba(255,153,0,.2)",color:"var(--gray)",fontSize:9,fontFamily:"var(--sans)",lineHeight:1.6,letterSpacing:".3px"}}>
                        Connect MetaMask for on-chain settlement. Simulation mode active.
                      </div>
                    )}
                  </div>

                  {/* Stats */}
                  <div className="stats-section">
                    <div className="order-title" style={{marginBottom:6}}>ROUND STATS</div>
                    <div className="stats-grid">
                      {[
                        ["ROUND OPEN",fp(dm.sp)],
                        ["LIVE PRICE",fp(dm.lp)],
                        ["LONG POOL",`$${dm.pl.toFixed(2)}`],
                        ["SHORT POOL",`$${dm.ps.toFixed(2)}`],
                        ["TOTAL POOL",`$${(dm.pl+dm.ps).toFixed(2)}`],
                        ["LONG ODDS",dm.pl>0?`${((dm.pl+dm.ps)/dm.pl).toFixed(3)}x`:"N/A"],
                        ["SHORT ODDS",dm.ps>0?`${((dm.pl+dm.ps)/dm.ps).toFixed(3)}x`:"N/A"],
                        ["UNIT",dm.unit],
                      ].map(([k,v])=>(
                        <div key={k} className="stat-cell">
                          <div className="stat-lbl">{k}</div>
                          <div className="stat-val">{v}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Round meter */}
                  <div className="round-meter">
                    <div className="meter-label">
                      <span style={{color:"var(--gray2)",fontFamily:"var(--sans)",fontSize:9,letterSpacing:".5px"}}>ROUND PROGRESS</span>
                      <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--orange)"}}>{ft(dm.tl)}</span>
                    </div>
                    <div className="meter-bar">
                      <div className="meter-fill" style={{
                        width:`${((ROUND-dm.tl)/ROUND)*100}%`,
                        background:dm.phase==="LOCKED"?"#FF3333":"var(--orange)"
                      }}/>
                    </div>
                    <div className="tug-section">
                      <div className="tug-labels">
                        <span style={{color:"var(--green)"}}>L {(()=>{const t=dm.pl+dm.ps;return t>0?(dm.pl/t*100).toFixed(1):50})()}%</span>
                        <span style={{color:"var(--gray2)"}}>SENTIMENT</span>
                        <span style={{color:"var(--red)"}}>S {(()=>{const t=dm.pl+dm.ps;return t>0?(dm.ps/t*100).toFixed(1):50})()}%</span>
                      </div>
                      <div className="tug-bar">
                        <div className="tug-long" style={{width:`${(()=>{const t=dm.pl+dm.ps;return t>0?(dm.pl/t)*100:50})()}%`}}/>
                      </div>
                    </div>
                  </div>

                  {/* Last result */}
                  {dm.last&&(
                    <div style={{padding:"8px 12px",borderBottom:"1px solid var(--border2)"}}>
                      <div className="order-title" style={{marginBottom:6}}>LAST SETTLEMENT</div>
                      {[
                        ["ROUND",`#${dm.last.rid}`],
                        ["DIRECTION",dm.last.dir],
                        ["OPEN",fp(dm.last.sp)],
                        ["CLOSE",fp(dm.last.ep)],
                        ["POOL",`$${dm.last.tot.toFixed(2)}`],
                        ["PAYOUT",`${dm.last.mult}x`],
                      ].map(([k,v])=>(
                        <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:10}}>
                          <span style={{color:"var(--gray2)",fontFamily:"var(--sans)"}}>{k}</span>
                          <span style={{fontFamily:"var(--mono)",color:v==="LONG"?"var(--green)":v==="SHORT"?"var(--red)":"var(--white)"}}>{v}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── BOTTOM TABS ── */}
      <div className="bottom">
        <div className="bottom-tabs">
          {[["POSITIONS","MY POSITIONS",openPos.length],["HISTORY","ORDER HISTORY",positions.length],["WINS","SETTLED WINS",wins.length]].map(([v,label,cnt])=>(
            <div key={v} className={`bot-tab${botTab===v?" active":""}`} onClick={()=>setBotTab(v)}>
              {label}{cnt>0&&<span className="count">{cnt}</span>}
            </div>
          ))}
          <div className="bot-tab" style={{marginLeft:"auto",borderLeft:"1px solid var(--border2)"}}
            onClick={()=>setModal({title:"SMART CONTRACT LOG",body:`Contract: <strong>${CONTRACT}</strong><br/>All transactions are logged on-chain. Connect MetaMask and replace the contract address to enable live settlement.`})}>
            CONTRACT LOG ▸
          </div>
        </div>
        <div className="bottom-content">
          {botTab==="POSITIONS"&&(
            openPos.length===0?(
              <div className="empty-state">NO OPEN POSITIONS — PLACE A BET TO BEGIN</div>
            ):(
              <table className="pos-table">
                <thead><tr>
                  <th>ASSET</th><th>SIDE</th><th>STAKE</th><th>ENTRY</th><th>LIVE</th><th>P&L</th><th>ROUND</th><th>TIME</th><th>STATUS</th>
                </tr></thead>
                <tbody>
                  {openPos.map(p=>{
                    const m=mkts.find(x=>x.id===p.assetId);
                    const live=m?m.lp:p.sp;
                    const unreal=p.side==="LONG"?(live-p.sp)*p.stake/p.sp:-(live-p.sp)*p.stake/p.sp;
                    return(
                      <tr key={p.id}>
                        <td style={{color:"var(--white)",fontFamily:"var(--sans)",fontWeight:600}}>{p.sym}</td>
                        <td className={p.side==="LONG"?"pos-side-long":"pos-side-short"}>{p.side}</td>
                        <td>{p.stake} ETH</td>
                        <td>{fp(p.sp)}</td>
                        <td style={{color:live>=p.sp?"var(--green)":"var(--red)"}}>{m?fp(live):"—"}</td>
                        <td style={{color:unreal>=0?"var(--green)":"var(--red)"}}>{unreal>=0?"+":""}{unreal.toFixed(4)}</td>
                        <td>#{p.rid}</td>
                        <td>{p.ts}</td>
                        <td><span className="pos-status pos-open">OPEN</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )
          )}
          {botTab==="HISTORY"&&(
            positions.length===0?(
              <div className="empty-state">NO ORDER HISTORY</div>
            ):(
              <table className="pos-table">
                <thead><tr>
                  <th>ASSET</th><th>SIDE</th><th>STAKE</th><th>ENTRY</th><th>ROUND</th><th>TIME</th><th>STATUS</th><th>P&L</th><th>ACTION</th>
                </tr></thead>
                <tbody>
                  {positions.map(p=>(
                    <tr key={p.id}>
                      <td style={{color:"var(--white)",fontFamily:"var(--sans)",fontWeight:600}}>{p.sym}</td>
                      <td className={p.side==="LONG"?"pos-side-long":"pos-side-short"}>{p.side}</td>
                      <td>{p.stake} ETH</td>
                      <td>{fp(p.sp)}</td>
                      <td>#{p.rid}</td>
                      <td>{p.ts}</td>
                      <td><span className={`pos-status ${p.status==="OPEN"?"pos-open":p.status==="WIN"?"pos-win":"pos-loss"}`}>{p.status}</span></td>
                      <td style={{color:p.pnl==null?"var(--gray)":p.pnl>=0?"var(--green)":"var(--red)"}}>
                        {p.pnl!=null?(p.pnl>=0?"+":"")+p.pnl+" ETH":"—"}
                      </td>
                      <td>{p.status==="WIN"&&<button className="claim-btn" onClick={()=>claimPos(p)}>CLAIM</button>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )
          )}
          {botTab==="WINS"&&(
            wins.length===0?(
              <div className="empty-state">NO SETTLED WINS YET</div>
            ):(
              <table className="pos-table">
                <thead><tr>
                  <th>ASSET</th><th>SIDE</th><th>STAKE</th><th>PAYOUT</th><th>RETURN</th><th>ROUND</th><th>TIME</th>
                </tr></thead>
                <tbody>
                  {wins.map(p=>(
                    <tr key={p.id}>
                      <td style={{color:"var(--white)",fontFamily:"var(--sans)",fontWeight:600}}>{p.sym}</td>
                      <td className="pos-side-long">{p.side}</td>
                      <td>{p.stake} ETH</td>
                      <td style={{color:"var(--green)"}}>{(p.stake+(p.pnl||0)).toFixed(4)} ETH</td>
                      <td style={{color:"var(--green)"}}>+{p.pnl?.toFixed(4)} ETH</td>
                      <td>#{p.rid}</td>
                      <td>{p.ts}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )
          )}
        </div>
      </div>

      {/* ── STATUS BAR ── */}
      <div className="statusbar">
        <span>COMMOD/TERM INSTITUTIONAL PREDICTION MARKETS — SIMULATION + WEB3 READY</span>
        <span style={{display:"flex",gap:12,alignItems:"center"}}>
          <span className="sb-ok">● {mkts.filter(m=>m.phase==="OPEN").length}/{mkts.length} MARKETS LIVE</span>
          <span style={{color:"var(--border)"}}>|</span>
          <span className={wallet?"sb-ok":"sb-warn"}>{wallet?`⟠ ${chainName} ${wallet.bal} ETH`:"○ WALLET OFFLINE"}</span>
          <span style={{color:"var(--border)"}}>|</span>
          <span style={{fontFamily:"var(--mono)"}}>{now}</span>
        </span>
      </div>

      {/* ── MODAL ── */}
      {modal&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{modal.title}</div>
            <div className="modal-body" dangerouslySetInnerHTML={{__html:modal.body}}/>
            <button className="modal-close" onClick={()=>setModal(null)}>DISMISS</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
