<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRED/MKT — Prediction Markets Terminal</title>
  <style>
    :root {
      --black:#000000; --bg1:#030305; --bg2:#07070c; --panel:#0a0a12; --border:#1a1a2e;
      --border2:#222238; --blue:#003399; --blue2:#0044cc; --blue3:#1a3a8a;
      --amber:#FFB100; --amber2:#FF8C00; --green:#00FF41; --green2:#00CC33;
      --red:#FF2233; --red2:#CC0011; --white:#E8E8F0; --gray:#555570;
      --gray2:#333350; --cyan:#00CCFF; --gold:#FFD700;
      --mono:'Consolas','Monaco','Courier New',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:13px;}
    body{background:var(--black);color:var(--amber);font-family:var(--mono);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);}
    button{font-family:var(--mono);cursor:pointer;border:none;outline:none;}
    input{font-family:var(--mono);outline:none;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:#000;}
    ::-webkit-scrollbar-thumb{background:var(--blue3);}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}

    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes slideIn{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @keyframes glow{0%,100%{box-shadow:0 0 6px currentColor}50%{box-shadow:0 0 20px currentColor}}

    .blink{animation:blink 1s step-end infinite;}
    .pulse{animation:pulse 1.5s ease-in-out infinite;}

    #root{display:flex;flex-direction:column;min-height:100vh;}

    .cmd-bar{background:var(--blue);color:#fff;padding:4px 14px;display:flex;
      justify-content:space-between;align-items:center;font-size:12px;letter-spacing:.8px;
      border-bottom:1px solid #0055cc;flex-shrink:0;}
    .cmd-logo{font-size:14px;font-weight:bold;letter-spacing:2px;}
    .cmd-logo span{color:var(--amber);}

    .sub-bar{background:#000820;color:#6a8dd8;padding:2px 14px;display:flex;gap:18px;
      font-size:11px;border-bottom:1px solid #001155;overflow:hidden;flex-shrink:0;align-items:center;}

    .ticker-wrap{background:#000510;border-bottom:1px solid #001133;overflow:hidden;height:22px;flex-shrink:0;}
    .ticker-inner{display:inline-flex;gap:40px;white-space:nowrap;animation:ticker 80s linear infinite;padding:3px 0;font-size:11px;}
    .tick-up{color:var(--green);}
    .tick-dn{color:var(--red);}
    .tick-sym{color:var(--white);}

    .main-wrap{display:flex;flex:1;gap:2px;padding:2px;background:#000;overflow:hidden;min-height:0;}

    .sidebar{width:255px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
    .center-col{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;overflow-y:auto;}
    .trade-col{width:275px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}

    .panel{background:var(--panel);border:1px solid var(--border);}
    .ph{background:var(--blue);color:#fff;padding:3px 10px;font-size:11px;letter-spacing:1px;
      display:flex;justify-content:space-between;align-items:center;}
    .ph.ah{background:#3d2800;color:var(--amber);border-bottom:1px solid var(--amber2);}
    .ph.gh{background:#00260d;color:var(--green);border-bottom:1px solid var(--green2);}
    .pb{padding:8px 10px;}

    /* Market list */
    .mcard{padding:7px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;}
    .mcard:hover{background:#0d0d1a;}
    .mcard.act{background:#060616;border-left:2px solid var(--amber);}
    .mcard.act::after{content:'▶';position:absolute;right:7px;top:50%;transform:translateY(-50%);color:var(--amber);font-size:9px;}
    .mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
    .mc-sym{color:var(--white);font-size:12px;}
    .mc-price{font-size:12px;}
    .up{color:var(--green);}
    .dn{color:var(--red);}
    .mc-bot{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
    .mc-name{color:var(--gray);}
    .badge{font-size:9px;padding:1px 5px;border:1px solid;}
    .badge.o{color:#00CC33;border-color:#00CC33;}
    .badge.l{color:var(--amber);border-color:var(--amber);}
    .badge.r{color:var(--red);border-color:var(--red);}
    .pool-mini{display:flex;justify-content:space-between;font-size:9px;color:#445;margin-top:2px;}

    /* Price hero */
    .price-hero{padding:12px 16px;background:var(--panel);border:1px solid var(--border);}
    .ph-row{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;}
    .ph-sym{font-size:11px;color:var(--gray);margin-bottom:2px;letter-spacing:2px;}
    .ph-price{font-size:36px;letter-spacing:3px;line-height:1;}
    .ph-delta{font-size:18px;padding-bottom:4px;}
    .ph-right{margin-left:auto;text-align:right;}
    .ph-time{font-size:30px;letter-spacing:2px;}
    .ph-phase{font-size:11px;margin-top:2px;}
    .prog{height:3px;background:#111;margin-top:10px;}
    .prog-fill{height:100%;transition:width .9s linear;}

    /* Stats */
    .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px;}
    .sbox{background:#060610;border:1px solid var(--border);padding:5px 8px;}
    .slbl{font-size:9px;color:var(--gray);letter-spacing:1px;margin-bottom:2px;}
    .sval{font-size:13px;color:var(--amber);}

    /* Pool */
    .psec{padding:0 8px 8px;}
    .plbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
    .pbar{height:6px;background:var(--red);}
    .plong{height:100%;background:var(--green);transition:width .6s ease;}

    /* Last result */
    .rgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:8px;}
    .rbox .rl{font-size:9px;color:var(--gray);}
    .rbox .rv{font-size:12px;}

    /* Trade */
    .tsec{padding:10px;}
    .tlbl{font-size:10px;color:var(--gray);letter-spacing:1px;margin-bottom:5px;}
    .sinput{width:100%;background:#030310;border:1px solid var(--amber);color:var(--amber);
      font-size:18px;padding:6px 10px;margin-bottom:8px;font-family:var(--mono);}
    .sinput:focus{border-color:var(--gold);box-shadow:0 0 8px rgba(255,177,0,.3);}
    .qbets{display:flex;gap:4px;margin-bottom:10px;}
    .qb{flex:1;padding:4px 0;background:#0a0a14;color:var(--amber);border:1px solid var(--border2);font-size:11px;transition:all .12s;}
    .qb:hover{background:#15152a;border-color:var(--amber);}
    .qb.aq{background:var(--amber);color:#000;border-color:var(--amber);}
    .btn-lo{width:100%;padding:14px;font-size:16px;letter-spacing:3px;margin-bottom:6px;
      background:#001f00;color:var(--green);border:2px solid var(--green);transition:all .15s;}
    .btn-lo:hover:not(:disabled){background:#003300;box-shadow:0 0 18px rgba(0,255,65,.4);}
    .btn-lo:disabled{background:#0a0a0a;color:#333;border-color:#333;cursor:not-allowed;}
    .btn-sh{width:100%;padding:14px;font-size:16px;letter-spacing:3px;
      background:#1f0000;color:var(--red);border:2px solid var(--red);transition:all .15s;}
    .btn-sh:hover:not(:disabled){background:#330000;box-shadow:0 0 18px rgba(255,34,51,.4);}
    .btn-sh:disabled{background:#0a0a0a;color:#333;border-color:#333;cursor:not-allowed;}
    .bmsg{margin-top:8px;padding:6px 10px;font-size:11px;border:1px solid;}

    /* Wallet */
    .wsec{padding:10px;}
    .btn-wl{width:100%;padding:10px;font-size:12px;letter-spacing:1px;
      background:#001040;color:var(--cyan);border:1px solid var(--cyan);transition:all .15s;}
    .btn-wl:hover{background:#002060;box-shadow:0 0 12px rgba(0,204,255,.3);}
    .btn-wl.conn{background:#002a10;color:var(--green);border-color:var(--green);}
    .wrow{display:flex;justify-content:space-between;font-size:11px;margin-top:4px;}
    .wl{color:var(--gray);}
    .wv{color:var(--white);}

    /* Claim */
    .csec{padding:10px;}
    .btn-cl{width:100%;padding:9px;font-size:12px;letter-spacing:1px;margin-top:5px;
      background:#3a2a00;color:var(--gold);border:1px solid var(--gold);transition:all .15s;}
    .btn-cl:hover:not(:disabled){background:#5a4000;box-shadow:0 0 14px rgba(255,215,0,.4);}
    .btn-cl:disabled{background:#1a1a1a;color:#555;border-color:#333;cursor:not-allowed;}
    .crow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
    .cl2{color:var(--gray);}
    .cv2{color:var(--gold);}

    /* Log */
    .log-wrap{height:130px;overflow-y:auto;padding:6px 10px;font-size:11px;line-height:1.75;}
    .lline{display:flex;gap:6px;}
    .lts{color:#334;flex-shrink:0;}
    .lmsg{color:var(--green2);}
    .lwarn{color:var(--amber);}
    .lerr{color:var(--red);}
    .lsys{color:var(--cyan);}

    .status-bar{background:#000508;border-top:1px solid #001133;padding:2px 12px;
      display:flex;justify-content:space-between;font-size:10px;color:#444;flex-shrink:0;}
    .sok{color:var(--green2);}
    .swarn{color:var(--amber);}

    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;
      align-items:center;justify-content:center;z-index:1000;}
    .modal{background:var(--panel);border:1px solid var(--blue2);padding:24px;min-width:320px;
      max-width:420px;box-shadow:0 0 40px rgba(0,68,204,.5);animation:slideIn .2s ease-out;}
    .modal-title{color:#fff;font-size:14px;letter-spacing:1px;margin-bottom:16px;
      border-bottom:1px solid var(--border2);padding-bottom:8px;}
    .modal-body{color:var(--gray);font-size:12px;line-height:1.8;margin-bottom:16px;}
    .modal-body strong{color:var(--amber);}
    .modal-close{background:#111;color:var(--amber);border:1px solid var(--amber);padding:6px 20px;font-size:12px;float:right;}
    .modal-close:hover{background:#221a00;}

    canvas{display:block;}

    @media(max-width:1100px){.sidebar{width:210px;}.trade-col{width:240px;}}
    @media(max-width:800px){.main-wrap{flex-direction:column;}.sidebar,.trade-col{width:100%;}}
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── Markets ─────────────────────────────────────────────────────────────── */
const MKTS_DEF = [
  {id:"XCU", sym:"XCU/USD", name:"Copper",       base:4.1200,  vol:0.003,  icon:"🟤", cat:"METALS" },
  {id:"XAU", sym:"XAU/USD", name:"Gold",          base:2345.0,  vol:0.5,    icon:"🟡", cat:"METALS" },
  {id:"XAG", sym:"XAG/USD", name:"Silver",        base:28.42,   vol:0.09,   icon:"⚪", cat:"METALS" },
  {id:"BTC", sym:"BTC/USD", name:"Bitcoin",       base:67800,   vol:130,    icon:"🟠", cat:"CRYPTO" },
  {id:"ETH", sym:"ETH/USD", name:"Ethereum",      base:3540,    vol:9,      icon:"🔷", cat:"CRYPTO" },
  {id:"SOL", sym:"SOL/USD", name:"Solana",        base:168.4,   vol:1.2,    icon:"🟣", cat:"CRYPTO" },
  {id:"BNB", sym:"BNB/USD", name:"BNB",           base:585,     vol:2.2,    icon:"🟡", cat:"CRYPTO" },
  {id:"CL",  sym:"CL/USD",  name:"Crude Oil",     base:78.45,   vol:0.16,   icon:"🛢", cat:"ENERGY" },
  {id:"NG",  sym:"NG/USD",  name:"Nat. Gas",      base:2.31,    vol:0.012,  icon:"🔥", cat:"ENERGY" },
  {id:"EUR", sym:"EUR/USD", name:"Euro",          base:1.0845,  vol:0.0006, icon:"🇪🇺", cat:"FOREX" },
  {id:"GBP", sym:"GBP/USD", name:"Pound",         base:1.2730,  vol:0.0007, icon:"🇬🇧", cat:"FOREX" },
  {id:"SPX", sym:"SPX/USD", name:"S&P 500",       base:5420,    vol:10,     icon:"📈", cat:"INDEX" },
];

const ROUND = 300, LOCK = 60;
const CONTRACT = "0x0000000000000000000000000000000000000000"; // ← replace with your contract

/* ─── Utils ──────────────────────────────────────────────────────────────── */
function gauss(){
  let u=0,v=0;
  while(!u)u=Math.random();while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function nxt(p,vol){ return Math.max(p*.7,Math.min(p*1.5,p+gauss()*vol)); }
function r4(n){ return Math.round(n*10000)/10000; }
function fp(p){ return p>=1000?p.toFixed(2):p>=10?p.toFixed(3):p.toFixed(4); }
function ft(s){ return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }
function fa(a){ return a?`${a.slice(0,6)}…${a.slice(-4)}`:""; }
function ts(){ return new Date().toLocaleTimeString("en-US",{hour12:false}); }

/* ─── Sparkline ──────────────────────────────────────────────────────────── */
function Spark({data,height=90,mini=false}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||data.length<2) return;
    const cv=ref.current,ctx=cv.getContext("2d");
    const W=cv.offsetWidth||700, H=height;
    cv.width=W; cv.height=H; ctx.clearRect(0,0,W,H);
    const mn=Math.min(...data)*.999, mx=Math.max(...data)*1.001, rng=mx-mn||1;
    const xs=i=>(i/(data.length-1))*W;
    const ys=v=>H-((v-mn)/rng)*(H-4)-2;
    const up=data[data.length-1]>=data[0];
    if(!mini){
      ctx.strokeStyle="rgba(255,177,0,.05)"; ctx.lineWidth=1;
      for(let i=0;i<5;i++){const y=(i/4)*H;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    }
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,up?"rgba(0,255,65,.18)":"rgba(255,34,51,.18)");
    g.addColorStop(1,"rgba(0,0,0,0)");
    ctx.beginPath(); ctx.moveTo(xs(0),H);
    data.forEach((v,i)=>ctx.lineTo(xs(i),ys(v)));
    ctx.lineTo(xs(data.length-1),H); ctx.closePath();
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.lineWidth=mini?.9:1.5;
    ctx.strokeStyle=up?"#00FF41":"#FF2233";
    data.forEach((v,i)=>i===0?ctx.moveTo(xs(i),ys(v)):ctx.lineTo(xs(i),ys(v)));
    ctx.stroke();
    if(!mini){
      ctx.beginPath();
      ctx.arc(xs(data.length-1),ys(data[data.length-1]),3.5,0,Math.PI*2);
      ctx.fillStyle=up?"#00FF41":"#FF2233"; ctx.fill();
    }
  },[data,height,mini]);
  return <canvas ref={ref} style={{width:"100%",height,display:"block"}}/>;
}

/* ─── Init ───────────────────────────────────────────────────────────────── */
function initMkts(){
  return MKTS_DEF.map(m=>({
    ...m,
    lp: m.base, sp: m.base, hist: [m.base],
    phase:"OPEN",
    tl: Math.floor(ROUND-Math.random()*ROUND),
    rid: 1,
    pl: +(Math.random()*600).toFixed(2),
    ps: +(Math.random()*500).toFixed(2),
    last: null,
  }));
}

/* ─── App ────────────────────────────────────────────────────────────────── */
function App(){
  const [mkts,   setMkts]  = useState(initMkts);
  const [active, setActive]= useState("XCU");
  const [amt,    setAmt]   = useState("0.01");
  const [bmsg,   setBmsg]  = useState(null);
  const [wallet, setWallet]= useState(null);
  const [conn,   setConn]  = useState(false);
  const [log,    setLog]   = useState([{ts:ts(),msg:"PRED/MKT TERMINAL v2.5 INITIALIZED",t:"sys"}]);
  const [claims, setClaims]= useState([]);
  const [modal,  setModal] = useState(null);
  const [now,    setNow]   = useState(ts());
  const [flt,    setFlt]   = useState("ALL");
  const [txp,    setTxp]   = useState(false);

  const logRef=useRef(null);
  const mkRef=useRef(mkts); mkRef.current=mkts;

  const addLog=useCallback((msg,t="msg")=>{
    setLog(p=>{ const n=[...p,{ts:ts(),msg,t}]; return n.length>120?n.slice(-120):n; });
  },[]);

  /* Clock */
  useEffect(()=>{
    const id=setInterval(()=>{
      setNow(ts());
      setMkts(prev=>prev.map(m=>{
        let tl=Math.max(0,m.tl-1), phase=m.phase, rid=m.rid, sp=m.sp, pl=m.pl, ps=m.ps, last=m.last;
        if(tl>LOCK && phase!=="OPEN"){ phase="OPEN"; }
        else if(tl<=LOCK&&tl>0&&phase==="OPEN"){
          phase="LOCKED";
          addLog(`[${m.sym}] ROUND #${rid} LOCKED — BETS CLOSED`,"warn");
        } else if(tl===0&&phase!=="RESOLVED"){
          phase="RESOLVED";
          const dir=m.lp>sp?"LONG":"SHORT";
          const tot=pl+ps, wp=dir==="LONG"?pl:ps;
          const mult=wp>0?r4(tot/wp):0;
          last={rid,sp,ep:m.lp,dir,tot,mult};
          addLog(`[${m.sym}] ROUND #${rid} → ${dir} WINS | Pool $${tot.toFixed(2)}`,"sys");
          setTimeout(()=>{
            setMkts(pp=>pp.map(mm=>mm.id===m.id?{
              ...mm,phase:"OPEN",rid:mm.rid+1,sp:mm.lp,tl:ROUND,
              pl:+(Math.random()*300).toFixed(2),ps:+(Math.random()*250).toFixed(2),hist:[mm.lp],
            }:mm));
            addLog(`[${m.sym}] ROUND #${rid+1} OPENED AT $${fp(m.lp)}`);
          },1200);
        }
        return {...m,tl,phase,rid,sp,pl,ps,last};
      }));
    },1000);
    return ()=>clearInterval(id);
  },[addLog]);

  /* Price */
  useEffect(()=>{
    const id=setInterval(()=>{
      setMkts(prev=>prev.map(m=>{
        const lp=r4(nxt(m.lp,m.vol));
        const hist=[...m.hist,lp];
        return {...m,lp,hist:hist.length>150?hist.slice(-150):hist};
      }));
    },2000);
    return ()=>clearInterval(id);
  },[]);

  /* Log scroll */
  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; },[log]);

  /* MetaMask connect */
  const connectWallet=useCallback(async()=>{
    if(!window.ethereum){
      setModal({title:"METAMASK NOT FOUND",body:"MetaMask is required for on-chain betting. Install it at <strong>metamask.io</strong>, then reload."});
      return;
    }
    setConn(true);
    try{
      const [addr]=await window.ethereum.request({method:"eth_requestAccounts"});
      const chainHex=await window.ethereum.request({method:"eth_chainId"});
      const chainId=parseInt(chainHex,16);
      const balHex=await window.ethereum.request({method:"eth_getBalance",params:[addr,"latest"]});
      const bal=(parseInt(balHex,16)/1e18).toFixed(4);
      setWallet({address:addr,bal,chainId});
      addLog(`WALLET CONNECTED ${fa(addr)} | ${CHAINS[chainId]||"Chain "+chainId} | ${bal} ETH`,"sys");
      window.ethereum.on("accountsChanged",a=>{
        if(!a.length){setWallet(null);addLog("WALLET DISCONNECTED","warn");}
        else{setWallet(w=>({...w,address:a[0]}));addLog(`ACCOUNT → ${fa(a[0])}`,"sys");}
      });
      window.ethereum.on("chainChanged",c=>{
        const cid=parseInt(c,16);
        setWallet(w=>({...w,chainId:cid}));
        addLog(`NETWORK → ${CHAINS[cid]||"Chain "+cid}`,"warn");
      });
    }catch(e){ addLog(`CONNECT FAILED: ${e.message}`,"err"); }
    setConn(false);
  },[addLog]);

  const CHAINS={1:"MAINNET",5:"GOERLI",11155111:"SEPOLIA",137:"POLYGON",42161:"ARBITRUM",10:"OPTIMISM",8453:"BASE",56:"BSC"};

  /* Place Bet */
  const placeBet=useCallback(async side=>{
    const m=mkRef.current.find(x=>x.id===active);
    if(!m) return;
    if(m.phase!=="OPEN"){ setBmsg({t:`⚠ BETTING ${m.phase}`,c:"#FF8800"}); setTimeout(()=>setBmsg(null),3000); return; }
    const a=parseFloat(amt);
    if(!a||a<=0){ setBmsg({t:"⚠ INVALID AMOUNT",c:"#FF8800"}); setTimeout(()=>setBmsg(null),3000); return; }

    if(wallet&&window.ethereum&&CONTRACT!=="0x0000000000000000000000000000000000000000"){
      setTxp(true);
      addLog(`TX → ${side} ${a} ETH on ${m.sym} Round #${m.rid}`,"warn");
      try{
        const mIdx=MKTS_DEF.findIndex(x=>x.id===active);
        const sideN=side==="LONG"?0:1;
        const weiHex="0x"+Math.floor(a*1e18).toString(16);
        const data="0x1b9a9323"+mIdx.toString(16).padStart(64,"0")+sideN.toString(16).padStart(64,"0");
        const txHash=await window.ethereum.request({method:"eth_sendTransaction",params:[{
          from:wallet.address,to:CONTRACT,value:weiHex,data
        }]});
        addLog(`TX SUBMITTED ${txHash.slice(0,18)}…`,"sys");
        setBmsg({t:`✓ TX ${txHash.slice(0,14)}…`,c:"#00FF41"});
        setClaims(p=>[...p,{id:active,sym:m.sym,rid:m.rid,amt:+(a*1.85).toFixed(4),tx:txHash}]);
      }catch(e){
        addLog(`TX FAILED: ${e.message}`,"err");
        setBmsg({t:"⚠ TX REJECTED",c:"#FF2233"});
      }
      setTxp(false);
    } else {
      /* Simulation */
      const idx=MKTS_DEF.findIndex(x=>x.id===active);
      setMkts(prev=>prev.map((mm,i)=>i===idx?{
        ...mm,
        pl:side==="LONG"?+(mm.pl+a).toFixed(4):mm.pl,
        ps:side==="SHORT"?+(mm.ps+a).toFixed(4):mm.ps,
      }:mm));
      addLog(`[SIM] ${side} ${a} ETH on ${m.sym} #${m.rid}${!wallet?" — connect wallet for real bets":""}`);
      setBmsg({t:`✓ ${side} ${a} ETH (SIMULATION)`,c:"#00FF41"});
      setClaims(p=>[...p,{id:active,sym:m.sym,rid:m.rid,amt:+(a*1.9).toFixed(4),tx:null}]);
    }
    setTimeout(()=>setBmsg(null),4000);
  },[wallet,active,amt,addLog]);

  /* Claim */
  const claim=useCallback(async c=>{
    if(!wallet){ addLog("Connect wallet to claim","warn"); return; }
    setTxp(true);
    addLog(`CLAIMING ${c.amt} ETH from ${c.sym} #${c.rid}`,"warn");
    try{
      if(window.ethereum&&CONTRACT!=="0x0000000000000000000000000000000000000000"){
        const mIdx=MKTS_DEF.findIndex(x=>x.id===c.id);
        const data="0x2e7ba6ef"+mIdx.toString(16).padStart(64,"0")+c.rid.toString(16).padStart(64,"0");
        const tx=await window.ethereum.request({method:"eth_sendTransaction",params:[{from:wallet.address,to:CONTRACT,value:"0x0",data}]});
        addLog(`CLAIM TX ${tx.slice(0,18)}…`,"sys");
      } else {
        addLog(`[SIM] CLAIMED ${c.amt} ETH from ${c.sym}`,"sys");
      }
      setClaims(p=>p.filter(x=>!(x.id===c.id&&x.rid===c.rid)));
      setBmsg({t:`✓ CLAIMED ${c.amt} ETH`,c:"#FFD700"});
    }catch(e){ addLog(`CLAIM FAILED: ${e.message}`,"err"); }
    setTxp(false);
    setTimeout(()=>setBmsg(null),4000);
  },[wallet,addLog]);

  /* Derived */
  const am=useMemo(()=>mkts.find(m=>m.id===active),[mkts,active]);
  const filtered=useMemo(()=>flt==="ALL"?mkts:mkts.filter(m=>m.cat===flt),[mkts,flt]);
  const cats=["ALL","CRYPTO","METALS","ENERGY","FOREX","INDEX"];
  const chainName=wallet?(CHAINS[wallet.chainId]||"Chain "+wallet.chainId):"";

  const up   = am?am.lp>=am.sp:true;
  const delt = am?am.lp-am.sp:0;
  const dPct = am&&am.sp?(delt/am.sp)*100:0;
  const tot  = am?am.pl+am.ps:0;
  const lPct = tot>0?(am.pl/tot)*100:50;
  const phCl = am?.phase==="OPEN"?"o":am?.phase==="LOCKED"?"l":"r";
  const phSy = am?.phase==="OPEN"?"●":am?.phase==="LOCKED"?"⬡":"■";

  return(
    <div id="root">
      {/* Command bar */}
      <div className="cmd-bar">
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span className="cmd-logo">PRED<span>/</span>MKT</span>
          <span style={{color:"#6a8dd8",fontSize:11}}>DECENTRALIZED PREDICTION MARKETS TERMINAL</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14,fontSize:11}}>
          <span>{now}</span>
          <span style={{color:"#334"}}>|</span>
          <span>{mkts.filter(m=>m.phase==="OPEN").length} OPEN / {mkts.length} MARKETS</span>
          <span style={{color:"#334"}}>|</span>
          <span style={{color:wallet?"#00FF41":"#FF8800"}} className={wallet?"":"blink"}>
            {wallet?`⟠ ${fa(wallet.address)}`:"○ WALLET OFFLINE"}
          </span>
        </div>
      </div>

      {/* Sub bar */}
      <div className="sub-bar">
        {mkts.slice(0,6).map(m=>{
          const u=m.lp>=m.sp;
          return <span key={m.id} style={{color:u?"#00CC33":"#CC0011"}}>{m.sym} {fp(m.lp)} {u?"▲":"▼"}</span>;
        })}
        <span style={{marginLeft:"auto",color:"#335",fontSize:10}}>PRED/MKT v2.5 — CONTRACT: {CONTRACT.slice(0,10)}…</span>
      </div>

      {/* Ticker */}
      <div className="ticker-wrap">
        <div className="ticker-inner">
          {[...mkts,...mkts,...mkts].map((m,i)=>{
            const u=m.lp>=m.sp;
            return <span key={i} style={{display:"inline-flex",gap:6}}>
              <span className="tick-sym">{m.sym}</span>
              <span className={u?"tick-up":"tick-dn"}>{fp(m.lp)} {u?"▲":"▼"} {Math.abs((m.lp-m.sp)/m.sp*100).toFixed(2)}%</span>
            </span>;
          })}
        </div>
      </div>

      {/* Main */}
      <div className="main-wrap">

        {/* Sidebar */}
        <div className="sidebar">
          {/* Wallet */}
          <div className="panel">
            <div className="ph" style={{background:wallet?"#002a10":"#001040"}}>
              <span>{wallet?"WALLET CONNECTED":"CONNECT WALLET"}</span>
              <span style={{color:wallet?"#00FF41":"#00CCFF",fontSize:10}}>{wallet?chainName:"WEB3"}</span>
            </div>
            <div className="wsec">
              {!wallet?(
                <button className={`btn-wl${conn?" pulse":""}`} onClick={connectWallet} disabled={conn}>
                  {conn?"CONNECTING…":"⟠ CONNECT METAMASK"}
                </button>
              ):(
                <>
                  <div className="wrow"><span className="wl">ADDRESS</span><span className="wv">{fa(wallet.address)}</span></div>
                  <div className="wrow"><span className="wl">BALANCE</span><span className="wv">{wallet.bal} ETH</span></div>
                  <div className="wrow"><span className="wl">NETWORK</span><span className="wv">{chainName}</span></div>
                  <div className="wrow"><span className="wl">CONTRACT</span><span className="wv" style={{fontSize:9}}>{CONTRACT.slice(0,10)}…</span></div>
                </>
              )}
            </div>
          </div>

          {/* Filter */}
          <div className="panel">
            <div className="ph"><span>FILTER MARKETS</span></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3,padding:6}}>
              {cats.map(c=>(
                <button key={c} onClick={()=>setFlt(c)}
                  style={{padding:"2px 7px",fontSize:10,
                    background:flt===c?"#003399":"#0a0a14",
                    color:flt===c?"#fff":"#556",
                    border:`1px solid ${flt===c?"#003399":"#1a1a2e"}`}}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {/* Market list */}
          <div className="panel" style={{flex:1,overflowY:"auto"}}>
            <div className="ph"><span>MARKETS ({filtered.length})</span><span style={{color:"#6a8dd8",fontSize:10}}>{flt}</span></div>
            {filtered.map(m=>{
              const u=m.lp>=m.sp, d=m.lp-m.sp, pct=(d/m.sp*100);
              return(
                <div key={m.id} className={`mcard${active===m.id?" act":""}`} onClick={()=>setActive(m.id)}>
                  <div className="mc-top">
                    <span className="mc-sym">{m.icon} {m.sym}</span>
                    <span className={`mc-price ${u?"up":"dn"}`}>{fp(m.lp)}</span>
                  </div>
                  <div className="mc-bot">
                    <span className="mc-name">{m.name}</span>
                    <span style={{fontSize:9,padding:"1px 5px",border:"1px solid",color:m.phase==="OPEN"?"#00CC33":m.phase==="LOCKED"?"#FFB100":"#FF2233",borderColor:m.phase==="OPEN"?"#00CC33":m.phase==="LOCKED"?"#FFB100":"#FF2233"}}>
                      {m.phase==="OPEN"?"●":m.phase==="LOCKED"?"⬡":"■"} {m.phase}
                    </span>
                  </div>
                  <div style={{width:"100%",height:28,marginBottom:3}}><Spark data={m.hist} height={28} mini/></div>
                  <div className="pool-mini">
                    <span style={{color:"#00AA22"}}>L ${m.pl.toFixed(2)}</span>
                    <span style={{color:"#666"}}>{ft(m.tl)}</span>
                    <span style={{color:"#AA0011"}}>S ${m.ps.toFixed(2)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Center */}
        <div className="center-col">
          {am&&(<>
            {/* Price hero */}
            <div className="price-hero">
              <div className="ph-row">
                <div>
                  <div className="ph-sym">{am.icon} {am.sym} — {am.name.toUpperCase()}</div>
                  <div className={`ph-price ${up?"up":"dn"}`}>${fp(am.lp)}</div>
                </div>
                <div style={{paddingBottom:4}}>
                  <div className={`ph-delta ${up?"up":"dn"}`}>
                    {delt>=0?"▲":"▼"} {Math.abs(delt).toFixed(am.lp>=100?2:4)} ({dPct.toFixed(3)}%)
                  </div>
                  <div style={{fontSize:10,color:"#444",marginTop:2}}>VS ROUND START · {am.cat}</div>
                </div>
                <div className="ph-right">
                  <div style={{fontSize:10,color:"#555",letterSpacing:1}}>TIME REMAINING</div>
                  <div className="ph-time" style={{color:am.phase==="LOCKED"?"#FF2233":"#FFB100"}}>{ft(am.tl)}</div>
                  <div className={`ph-phase badge ${phCl}`} style={{color:am.phase==="OPEN"?"#00CC33":am.phase==="LOCKED"?"#FFB100":"#FF2233",borderColor:am.phase==="OPEN"?"#00CC33":am.phase==="LOCKED"?"#FFB100":"#FF2233"}}>
                    {phSy} {am.phase} · ROUND #{am.rid}
                  </div>
                </div>
              </div>
              <div className="prog">
                <div className="prog-fill" style={{width:`${((ROUND-am.tl)/ROUND)*100}%`,background:am.phase==="LOCKED"?"#FF2233":"#FFB100"}}/>
              </div>
            </div>

            {/* Chart */}
            <div className="panel">
              <div className="ph"><span>PRICE CHART — {am.sym}</span><span style={{fontSize:10,color:"#6a8dd8"}}>{am.hist.length} TICKS · 2s INTERVAL</span></div>
              <div style={{paddingTop:4}}><Spark data={am.hist} height={95}/></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#334",padding:"3px 8px 5px"}}>
                <span>T-{am.hist.length*2}s</span>
                <span>LO ${fp(Math.min(...am.hist))}</span>
                <span>HI ${fp(Math.max(...am.hist))}</span>
                <span>NOW</span>
              </div>
            </div>

            {/* Stats */}
            <div className="panel">
              <div className="ph"><span>ROUND STATISTICS</span><span style={{fontSize:10,color:"#6a8dd8"}}>ROUND #{am.rid}</span></div>
              <div className="sgrid">
                {[
                  ["START PRICE",`$${fp(am.sp)}`],
                  ["LIVE PRICE", `$${fp(am.lp)}`],
                  ["TOTAL POOL", `$${tot.toFixed(2)}`],
                  ["LONG POOL",  `$${am.pl.toFixed(2)}`],
                  ["SHORT POOL", `$${am.ps.toFixed(2)}`],
                  ["LONG ODDS",  am.pl>0?`${(tot/am.pl).toFixed(3)}x`:"N/A"],
                  ["SHORT ODDS", am.ps>0?`${(tot/am.ps).toFixed(3)}x`:"N/A"],
                  ["PHASE",      am.phase],
                ].map(([k,v])=>(
                  <div key={k} className="sbox">
                    <div className="slbl">{k}</div>
                    <div className="sval" style={{fontSize:v.length>8?11:13}}>{v}</div>
                  </div>
                ))}
              </div>
              <div className="psec">
                <div className="plbl">
                  <span style={{color:"#00FF41"}}>▲ LONG ${am.pl.toFixed(2)} ({lPct.toFixed(1)}%)</span>
                  <span style={{color:"#FF2233"}}>▼ SHORT ${am.ps.toFixed(2)} ({(100-lPct).toFixed(1)}%)</span>
                </div>
                <div className="pbar"><div className="plong" style={{width:`${lPct}%`}}/></div>
              </div>
            </div>

            {/* Last result */}
            {am.last&&(
              <div className="panel">
                <div className="ph"><span>LAST SETTLED — ROUND #{am.last.rid}</span></div>
                <div className="rgrid">
                  {[["START",`$${fp(am.last.sp)}`],["END",`$${fp(am.last.ep)}`],["RESULT",am.last.dir],["POOL",`$${am.last.tot.toFixed(2)}`],["PAYOUT",`${am.last.mult}x`]].map(([k,v])=>(
                    <div key={k} className="rbox">
                      <div className="rl">{k}</div>
                      <div className="rv" style={{color:v==="LONG"?"#00FF41":v==="SHORT"?"#FF2233":"#FFB100"}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>)}

          {/* Log */}
          <div className="panel" style={{flex:1,minHeight:140}}>
            <div className="ph"><span>TERMINAL LOG</span><span style={{fontSize:10,color:"#6a8dd8"}}>{log.length} ENTRIES</span></div>
            <div className="log-wrap" ref={logRef}>
              {log.map((l,i)=>(
                <div key={i} className="lline">
                  <span className="lts">{l.ts}</span>
                  <span className={`l${l.t}`}>&gt; {l.msg}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Trade col */}
        <div className="trade-col">

          {/* Trade */}
          <div className="panel">
            <div className="ph gh">
              <span>PLACE BET — {am?.sym??""}</span>
              <span style={{fontSize:10}}>RND #{am?.rid??""}</span>
            </div>
            <div className="tsec">
              <div className="tlbl">STAKE (ETH)</div>
              <input type="number" className="sinput" min="0.001" step="0.001"
                value={amt} onChange={e=>setAmt(e.target.value)}/>
              <div className="qbets">
                {["0.005","0.01","0.05","0.1"].map(v=>(
                  <button key={v} className={`qb${amt===v?" aq":""}`} onClick={()=>setAmt(v)}>{v}</button>
                ))}
              </div>
              <button className="btn-lo" onClick={()=>placeBet("LONG")} disabled={am?.phase!=="OPEN"||txp}>
                {txp?"TX PENDING…":"▲ LONG"}
              </button>
              <button className="btn-sh" onClick={()=>placeBet("SHORT")} disabled={am?.phase!=="OPEN"||txp}>
                {txp?"TX PENDING…":"▼ SHORT"}
              </button>
              {am?.phase!=="OPEN"&&!bmsg&&(
                <div style={{marginTop:8,padding:"6px 10px",background:"#1a0800",border:"1px solid #FF8800",color:"#FF8800",fontSize:11,textAlign:"center"}}>
                  {am?.phase==="LOCKED"?"⬡ LOCKED — NEXT ROUND SOON":"■ RESOLVING…"}
                </div>
              )}
              {bmsg&&<div className="bmsg" style={{color:bmsg.c,borderColor:bmsg.c}}>{bmsg.t}</div>}
              {!wallet&&(
                <div style={{marginTop:8,padding:"6px 8px",background:"#000820",border:"1px solid #002266",color:"#6a8dd8",fontSize:10,textAlign:"center",lineHeight:1.6}}>
                  Simulation mode active.<br/>Connect MetaMask for on-chain bets.
                </div>
              )}
            </div>
          </div>

          {/* Claims */}
          <div className="panel">
            <div className="ph ah">
              <span>CLAIMABLE WINNINGS</span>
              <span style={{fontSize:10}}>{claims.length} PENDING</span>
            </div>
            <div className="csec">
              {claims.length===0?(
                <div style={{fontSize:11,color:"#334",textAlign:"center",padding:"8px 0"}}>NO PENDING CLAIMS</div>
              ):claims.map((c,i)=>(
                <div key={i} style={{marginBottom:8,padding:"6px 8px",background:"#0d0a00",border:"1px solid #3a2800"}}>
                  <div className="crow"><span className="cl2">MARKET</span><span className="cv2">{c.sym}</span></div>
                  <div className="crow"><span className="cl2">ROUND</span><span className="cv2">#{c.rid}</span></div>
                  <div className="crow"><span className="cl2">AMOUNT</span><span style={{color:"#FFD700"}}>{c.amt} ETH</span></div>
                  {c.tx&&<div className="crow"><span className="cl2">TX</span><span style={{color:"#555",fontSize:9}}>{c.tx.slice(0,14)}…</span></div>}
                  <button className="btn-cl" onClick={()=>claim(c)} disabled={txp||!wallet}>
                    {wallet?"⬡ CLAIM WINNINGS":"CONNECT WALLET FIRST"}
                  </button>
                </div>
              ))}
              {claims.length>0&&(
                <div style={{fontSize:10,color:"#445",textAlign:"center",marginTop:4}}>
                  TOTAL CLAIMABLE: {claims.reduce((a,c)=>a+c.amt,0).toFixed(4)} ETH
                </div>
              )}
            </div>
          </div>

          {/* Market info */}
          <div className="panel">
            <div className="ph"><span>MARKET INFO</span></div>
            <div className="pb">
              {am&&[
                ["CONTRACT",  CONTRACT.slice(0,12)+"…"],
                ["ROUND LEN", "5:00 MIN"],
                ["LOCK PHASE","1:00 MIN"],
                ["SETTLEMENT","LIVE PRICE"],
                ["MIN BET",   "0.001 ETH"],
                ["CATEGORY",  am.cat],
                ["ROUND #",   am.rid],
              ].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:11}}>
                  <span style={{color:"#555"}}>{k}</span><span style={{color:"#FFB100"}}>{v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Phase guide */}
          <div className="panel">
            <div className="ph"><span>PHASE GUIDE</span></div>
            <div className="pb" style={{fontSize:11}}>
              <div style={{marginBottom:5}}><span style={{color:"#00FF41"}}>● OPEN</span><span style={{color:"#555"}}> 0:00→4:00 | Bets accepted</span></div>
              <div style={{marginBottom:5}}><span style={{color:"#FFB100"}}>⬡ LOCKED</span><span style={{color:"#555"}}> 4:00→5:00 | No new bets</span></div>
              <div><span style={{color:"#FF2233"}}>■ RESOLVED</span><span style={{color:"#555"}}> Winnings distributed</span></div>
            </div>
          </div>
        </div>
      </div>

      {/* Status bar */}
      <div className="status-bar">
        <span>PRED/MKT DECENTRALIZED PREDICTION MARKETS — GITHUB PAGES READY</span>
        <span>
          <span className="sok">● {mkts.filter(m=>m.phase==="OPEN").length}/{mkts.length} LIVE</span>
          <span style={{margin:"0 8px",color:"#222"}}>|</span>
          <span className={wallet?"sok":"swarn"}>{wallet?`⟠ ${chainName}`:"○ WALLET OFFLINE"}</span>
        </span>
      </div>

      {/* Modal */}
      {modal&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">⚠ {modal.title}</div>
            <div className="modal-body" dangerouslySetInnerHTML={{__html:modal.body}}/>
            <button className="modal-close" onClick={()=>setModal(null)}>DISMISS</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
